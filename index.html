<!DOCTYPE html>
<html>
  <head>
    <title>Filter Database</title>
    <link href="css/style.css" rel="stylesheet" type="text/css" media="all" />
    <script src="database.js" type="text/javascript"></script>
    <script src="js/script.js" type="text/javascript"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <body class="theme-light">
    <header>
      <h1 id="page-title">Filter Database</h1>
      <span id="theme-toggle" class="material-symbols-rounded">dark_mode</span>
    </header>
  
    <main>
      <div id="filter-select">
        <section id="filters">
          <form id="filters-form" action="javascript:applyFilter()">
            <label for="input-search">Search</label>
            <input id="input-search" type="search" placeholder="Search"/>
            <label for="input-brand">Brand</label>
            <select id="input-brand">
              <option value="" selected>All Brands</option>
            </select>
            <label for="input-type">Type</label>
            <select id="input-type">
              <option value="" selected>All Types</option>
              <option value="Diffusion">Diffusion</option>
              <option value="Flare">Flare</option>
              <option value="Neutral Density">Neutral Density</option>
              <option value="Polarizer">Polarizer</option>
              <option value="Special Effect ">Special Effect</option>
            </select>
            <input type="reset" value="Reset" onclick="resetFilter()"/>
            <input type="button" value="Apply" onclick="applyFilter()"/>
          </form>
        </section>
        <section id="filter-list" class="grid">
          <div></div>
          <footer>
            <div id="display-count"></div>
            <div id="copyright">Made by <a href="//www.threads.net/@chrisephoto">@chrisphoto</a> | <a href="//github.com/chrisephoto/filter-database">View on Github</a></div>
          </footer>
        </section>
      </div>
      <section id="filter-details">
        <div id="filter-details-message">
          <h2>Select a filter to view details.</h2>
        </div>
        <div id="filter-details-container" class="hidden">
          <div id="filter-details-close">
            <span class="material-symbols-rounded">close</span>
          </div>
          <div id="filter-details-info">
            <table id="filter-info">
              <caption>Filter Details</caption>
              <tbody>
                <tr>
                  <th>Brand</th>
                  <td id="filter-info-brand">N/A</td>
                </tr>
                <tr>
                  <th>Model</th>
                  <td id="filter-info-model">N/A</td>
                </tr>
                <tr>
                  <th>Type</th>
                  <td id="filter-info-type">N/A</td>
                </tr>
                <tr>
                  <th>Exposure Impact</th>
                  <td id="filter-info-exp">N/A</td>
                </tr>
                <tr>
                  <th>Temperature Impact</th>
                  <td id="filter-info-temp">N/A</td>
                </tr>
                <tr>
                  <th>Tint Impact</th>
                  <td id="filter-info-tint">N/A</td>
                </tr>
                <tr>
                  <th>Where to Buy</th>
                  <td id="filter-info-buy">N/A</td>
                </tr>
              </tbody>
            </table>
            <div id="filter-images"></div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
